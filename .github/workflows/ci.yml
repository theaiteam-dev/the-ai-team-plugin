name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      shared: ${{ steps.filter.outputs.shared }}
      mcp-server: ${{ steps.filter.outputs.mcp-server }}
      kanban-viewer: ${{ steps.filter.outputs.kanban-viewer }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shared:
              - 'packages/shared/**'
              - 'package.json'
              - 'bun.lockb'
              - '.github/workflows/**'
            mcp-server:
              - 'packages/mcp-server/**'
              - 'packages/shared/**'
              - 'package.json'
              - 'bun.lockb'
              - '.github/workflows/**'
            kanban-viewer:
              - 'packages/kanban-viewer/**'
              - 'packages/shared/**'
              - 'package.json'
              - 'bun.lockb'
              - '.github/workflows/**'

  mcp-server:
    name: MCP Server
    needs: [changes]
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.mcp-server == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/mcp-server
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
        working-directory: .
      - run: bun run build
        working-directory: packages/shared
      - run: bun run lint
      - run: bunx tsc --noEmit
      - run: bun run test

  shared:
    name: Shared Package
    needs: [changes]
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/shared
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
        working-directory: .
      - run: bunx tsc --noEmit

  dist-freshness-check:
    name: dist freshness check
    needs: [changes]
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.mcp-server == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Build shared package
        run: bun run build
        working-directory: packages/shared
      - name: Build mcp-server package (tsc)
        run: bun run build
        working-directory: packages/mcp-server
      - name: Bundle mcp-server (esbuild)
        run: bun run bundle
        working-directory: packages/mcp-server
      - name: Check dist is up-to-date
        run: |
          if ! git diff --exit-code packages/shared/dist/ packages/mcp-server/dist/; then
            echo "::error::dist/ is out of date. Run 'bun run build' in packages/shared and packages/mcp-server (and 'bun run bundle' in packages/mcp-server), then commit the result."
            exit 1
          fi

  kanban-viewer:
    name: Kanban Viewer
    needs: [changes]
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.kanban-viewer == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/kanban-viewer
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: bun install
        working-directory: .
      - run: bunx prisma generate
      - run: mkdir -p ${{ github.workspace }}/packages/kanban-viewer/prisma/data
      - run: bunx prisma migrate deploy --config prisma/prisma.config.ts
        env:
          DATABASE_URL: file:${{ github.workspace }}/packages/kanban-viewer/prisma/data/dev.db
      - run: bun run lint
      - run: bunx tsc --noEmit
      - run: bun run test
        env:
          DATABASE_URL: file:${{ github.workspace }}/packages/kanban-viewer/prisma/data/dev.db
      - run: bun run build
