name: Release

on:
  push:
    branches: [main]    # semantic-release determines if a new version is needed
    tags: ["v*"]        # manual tag fallback
  workflow_dispatch:     # manual trigger for re-runs

permissions:
  contents: write
  packages: write

jobs:
  # ── Step 1: Semantic Release (only on push to main) ─────────────────
  # Analyzes conventional commits since last tag, determines the next
  # version, creates a GitHub Release + git tag. Skipped for manual tags.
  semantic-release:
    name: Semantic Release
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      new-release: ${{ steps.release.outputs.new_release_published }}
      version: ${{ steps.release.outputs.new_release_git_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: cycjimmy/semantic-release-action@v4
        id: release
        with:
          extra_plugins: |
            @semantic-release/commit-analyzer
            @semantic-release/release-notes-generator
            @semantic-release/github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release result
        if: steps.release.outputs.new_release_published == 'true'
        run: echo "Released ${{ steps.release.outputs.new_release_git_tag }}"

  # ── Step 2: Resolve version ─────────────────────────────────────────
  # Normalizes the version tag whether it came from semantic-release or
  # a manual tag push, so downstream jobs have a single source of truth.
  resolve-version:
    name: Resolve Version
    needs: [semantic-release]
    if: |
      !failure() && !cancelled() && (
        startsWith(github.ref, 'refs/tags/v') ||
        needs.semantic-release.outputs.new-release == 'true'
      )
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ needs.semantic-release.outputs.version }}" >> "$GITHUB_OUTPUT"
          fi
      - run: echo "Version → ${{ steps.version.outputs.version }}"

  # ── Step 3: Build CLI binaries ──────────────────────────────────────
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: [resolve-version]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: packages/ateam-cli/go.sum

      - name: Build binary
        working-directory: packages/ateam-cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -ldflags="-s -w -X ateam/cmd.Version=${{ needs.resolve-version.outputs.version }}" -o ateam-${{ matrix.goos }}-${{ matrix.goarch }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ateam-${{ matrix.goos }}-${{ matrix.goarch }}
          path: packages/ateam-cli/ateam-${{ matrix.goos }}-${{ matrix.goarch }}

  # ── Step 4: Upload release assets ───────────────────────────────────
  # Attaches binaries to the GitHub Release. If semantic-release already
  # created the release, this adds to it. For manual tags, it creates one.
  upload-assets:
    name: Upload Release Assets
    needs: [build, resolve-version]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Attach binaries to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-version.outputs.version }}
          files: artifacts/ateam-*

  # ── Step 5: Publish Docker image ────────────────────────────────────
  docker:
    name: Publish kanban-viewer image
    needs: [resolve-version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/kanban-viewer/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/kanban-viewer:${{ needs.resolve-version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/kanban-viewer:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
